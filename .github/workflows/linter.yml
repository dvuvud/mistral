name: Lint Code Base

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  run-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint Code Base
        uses: github/super-linter@v7
        env:
          DEFAULT_BRANCH: "main"

          VALIDATE_ALL_CODEBASE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

          VALIDATE_JAVA_FORMAT: true
          VALIDATE_TYPESCRIPT_ES: true
          VALIDATE_ANGULAR: true

          FILTER_REGEX_EXCLUDE: (node_modules/|target/|dist/|.*\.spec\.ts)



<div class="admin-top">
  <mat-toolbar class="mat-sys-primary">
    <span>KîndGuard</span>
    <span class="example-spacer"></span>
    <button matButton="tonal" (click)="logout()">Logout</button>
  </mat-toolbar>
</div>

<div class="admin-container">
  <h1 class="admin-header">
    <mat-icon>admin_panel_settings</mat-icon>
    Adminstration
  </h1>
  <mat-card>
    <mat-card-content>
      <h2>Inaktiva användare</h2>
      <inactive-users></inactive-users>
    </mat-card-content>
  </mat-card>
  <h2>Lägg till barn</h2>


  <add-child-form (childAdded)="onChildAdded()">
  </add-child-form>

  <mat-card>
    <mat-card-header>
      <mat-card-title></mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <child-admin-list (childGroupChanged)="onChildGroupChanged()">
      </child-admin-list>
    </mat-card-content>
  </mat-card>


  <mat-card>
    <mat-card-header>
      <h2>Grupper</h2>
    </mat-card-header>
    <mat-card-content>
      <group (groupCreated)="onGroupCreated()"></group>
    </mat-card-content>
  </mat-card>

</div>

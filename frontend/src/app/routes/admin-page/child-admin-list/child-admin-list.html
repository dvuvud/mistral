<p>Antal barn: {{children.length}}</p>
<div class="child-admin-list-container">
    <mat-list>
        @for (child of children; track child.id; let last = $last) { <!--håller koll på id-->
        <mat-list-item>
            <span matListItemTitle>
                {{child.name}}
            </span>
        </mat-list-item>
        @if (!last) {
        <mat-divider></mat-divider>
        }
        }

    </mat-list>

</div>

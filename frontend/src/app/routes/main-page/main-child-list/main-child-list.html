<div class="child-list-container">
  <mat-card>
    <mat-card-header>
      <mat-form-field>
        <mat-label>Välj klass</mat-label>
        <mat-select>
          @for (group of allGroups(); track group) {
            <mat-option [value]="group.name">{{group.name}}</mat-option>
          }
          <mat-option [value]="">Alla elever</mat-option>
        </mat-select>
      </mat-form-field>
    </mat-card-header>
      <mat-form-field subscriptSizing="dynamic">
      <mat-label><mat-icon>search</mat-icon>Sök</mat-label>
      <input matInput #searchQuery type="search" (input)="onSearchUpdated(searchQuery.value.toLowerCase())">
    </mat-form-field>
  </mat-card>
  <mat-action-list class="list-class">
    @for (Child of searchedChildren(); track Child.id; let last = $last) {
    
      <button mat-list-item (click)="onSelectChild(Child)">
        <span matListItemTitle>{{Child.name}} </span>

        <div matListItemMeta class="meta-container">
            <attendance-box [disabled]=true [childSignal]="Child"></attendance-box>
        </div>
      </button>
      

      @if (!last) {
        <mat-divider></mat-divider>
      }
    }
  }
</mat-action-list>

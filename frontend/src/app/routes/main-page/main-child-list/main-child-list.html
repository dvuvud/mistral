<h2>Nyckelpigorna</h2> <!--TODO: klassnamn variabel-->
<div class="child-list-container">
  <mat-action-list>
    @for (child of children(); track child; let last = $last) {
      <li>
        <button mat-list-item (click)="onSelectChild(child)">
          <span matListItemLabel>{{child.name}}</span>
        </button>
      </li>

      @if (!last) {
        <mat-divider></mat-divider>
      }
    }
  </mat-action-list>
</div>

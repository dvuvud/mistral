<mat-card appearance="outlined">
    <mat-card-header>
      <div class="card-header-segment card-header-left">
        <div mat-card-avatar class="icon-display"><mat-icon>person</mat-icon></div>
        <mat-card-title>{{(currentUser | async)?.name}}</mat-card-title>
        <mat-card-subtitle>{{(currentUser | async)?.role}}</mat-card-subtitle>
      </div>
      <div class="card-header-segment card-header-right">
        <h2>Din färg</h2>
        <input type="color" matInput matNativeControl (input)="updateColor()" name="name" [(ngModel)]="teacherColor">
      </div>

    </mat-card-header>
    <mat-card-content>
        <p>Mejladress: {{(currentUser | async)?.email}}</p>
        <p>Exempeltext</p>
        <p>Exempeltext</p>
        <p>Exempeltext</p>
        <p>Exempeltext</p>
        <p>Exempeltext</p>
        <p>Exempeltext</p>
    </mat-card-content>
</mat-card>

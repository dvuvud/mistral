<div class="main-nav">
  <mat-toolbar class="mat-sys-primary">
    <span>KîndGuard</span>
    <span class="example-spacer"></span>
    <button matButton="tonal" (click)="logout()">Logout</button>
  </mat-toolbar>
</div>

<div class="main-body">
  <div class="main-panel-container">
    <mat-tab-group mat-stretch-tabs="false" 
                   mat-align-tabs="start" 
                   dynamicHeight (selectedTabChange)="onTabChange($event)"
                   [preserveContent]="true">
      
      @for (group of allGroups(); track group.id) {
        <mat-tab label="{{group.name}}">
        
            <main-panel 
              (attendanceChangeEvent)="wsUpdateAttendance($event)" 
              [groupSignal]="group">
            </main-panel>

        </mat-tab>
      } 
    </mat-tab-group>
  </div>
</div>

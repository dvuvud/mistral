<mat-card>
  <mat-card-content class="main-card-content">
    <div class="main-card-left">
      <mat-card-header>
        <span>Idag: {{getDate()}}</span>
      </mat-card-header>
      @if (childSignal().name !== ''){
      <div class="childDisplay">
        <child-display (attendanceChangeEvent)="wsUpdateAttendance($event)" [(childSignal)]="childSignal"></child-display>
      </div>
      }
      <main-live-journal [child]="childSignal()"></main-live-journal>
    </div>
    <div class="main-card-right">
      <main-child-list [(childSignal)]="childSignal"></main-child-list>

    </div>
  </mat-card-content>
</mat-card>

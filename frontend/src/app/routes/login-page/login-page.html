<!--
  [(denna)] syntax är för 2-vägsbindning. Vi binder email från login-page.ts till email från login-container.ts
  (event)=callback() syntax lysnar efter ett event och anropar callback() från .ts filen.
-->
<app-login-container class="login-page-container"
  [(email)]="email"
  [(password)]="password"
  [(name)]="name"
  [(lastName)]="lastName"
  [(errorMessage)]="errorMessage"
  (loginSubmitEvent)="onLoginSubmit()"
  (registerSubmitEvent)="onRegisterSubmit()">
</app-login-container>
